server:
  port: ${PORT:8080}

spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 5
      minimum-idle: 1
      idle-timeout: 30000
      connection-timeout: 20000
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    properties:
      hibernate:
        format_sql: false
  jackson:
    serialization:
      write-dates-as-timestamps: false
    time-zone: UTC
  h2:
    console:
      enabled: false

jwt:
  secret: ${JWT_SECRET}
  expiration: 86400000

app:
  superadmin:
    email: ${APP_SUPERADMIN_EMAIL:}
  security:
    cors:
      allowed-origin-patterns:
        - "https://veretest.online"


logging:
  level:
    root: INFO
    com.sportapp: INFO
    org.springframework.security: INFO
