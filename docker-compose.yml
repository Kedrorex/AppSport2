services:
  postgres:
    image: postgres:16-alpine
    container_name: sportapp-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-sportapp}
      POSTGRES_USER: ${POSTGRES_USER:-sportapp}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-sportapp} -d ${POSTGRES_DB:-sportapp}"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    mem_limit: 1g

  backend:
    build:
      context: ./sport-app-backend
      dockerfile: Dockerfile
    container_name: sportapp-backend
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: prod
      PORT: 8080
      DB_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-sportapp}
      DB_USERNAME: ${POSTGRES_USER:-sportapp}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      SPRING_JPA_HIBERNATE_DDL_AUTO: ${SPRING_JPA_HIBERNATE_DDL_AUTO:-update}
      JAVA_TOOL_OPTIONS: -XX:MaxRAMPercentage=75 -XX:InitialRAMPercentage=25 -XX:+UseG1GC
    expose:
      - "8080"
    restart: unless-stopped
    mem_limit: 768m

  frontend:
    build:
      context: ./SportApp2
      dockerfile: Dockerfile
    container_name: sportapp-frontend
    depends_on:
      - backend
    ports:
      - "80:80"
      - "443:443"
    environment:                      
      - VITE_API_URL=https://veretest.online/api
    volumes:
      - certbot-www:/var/www/certbot
      - certbot-etc:/etc/letsencrypt
    restart: unless-stopped
    mem_limit: 256m

  certbot:
    image: certbot/certbot:latest
    container_name: sportapp-certbot
    volumes:
      - certbot-www:/var/www/certbot
      - certbot-etc:/etc/letsencrypt
    entrypoint: >
      /bin/sh -c "trap exit TERM; while :; do
      certbot renew --webroot -w /var/www/certbot --quiet;
      sleep 12h & wait $${!};
      done"
    restart: unless-stopped
    mem_limit: 128m

volumes:
  postgres-data:
  certbot-www:
  certbot-etc:
